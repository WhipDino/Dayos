<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#FAF8F5">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <title>DayOS — Criar Conta</title>
    <style>
        /* ═══════════════════════════════════════════════════
       DESIGN TOKENS
       ═══════════════════════════════════════════════════ */
        :root {
            --bg: #FAF8F5;
            --bg-input: #F2F0ED;
            --accent: #F4A76C;
            --accent-hover: #E8955A;
            --text-primary: #2D2D2D;
            --text-secondary: #6B6B6B;
            --text-tertiary: #8A8A8E;
            --text-placeholder: #AEAEB2;
            --border-light: #E5E5EA;
            --white: #FFFFFF;

            --font-display: -apple-system, 'SF Pro Display', 'Inter', 'Helvetica Neue', system-ui, sans-serif;
            --font-text: -apple-system, 'SF Pro Text', 'Inter', 'Helvetica Neue', system-ui, sans-serif;

            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        /* ═══════════════════════════════════════════════════
       RESET & BASE
       ═══════════════════════════════════════════════════ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }

        body {
            height: 100%;
            overflow: hidden;
            font-family: var(--font-text);
            background-color: var(--bg);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            overscroll-behavior: none;
        }

        /* ═══════════════════════════════════════════════════
       LAYOUT
       ═══════════════════════════════════════════════════ */
        .signup-screen {
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
            padding-top: calc(var(--safe-top) + 12px);
            padding-bottom: calc(var(--safe-bottom) + 16px);
            padding-left: 24px;
            padding-right: 24px;
        }

        /* ═══════════════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════════════ */
        .header {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 36px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeSlideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) 0.05s forwards;
        }

        .back-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            cursor: pointer;
            margin-left: -8px;
            margin-bottom: 16px;
            border-radius: 12px;
            transition: background 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .back-button:hover {
            background: rgba(0, 0, 0, 0.04);
        }

        .back-button:active {
            background: rgba(0, 0, 0, 0.08);
        }

        .back-arrow {
            width: 20px;
            height: 20px;
            stroke: var(--text-primary);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .header-title {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .header-subtitle {
            font-family: var(--font-text);
            font-size: 15px;
            font-weight: 400;
            line-height: 1.45;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        /* ═══════════════════════════════════════════════════
       SOCIAL LOGIN
       ═══════════════════════════════════════════════════ */
        .social-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 28px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeSlideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) 0.15s forwards;
        }

        .google-button {
            display: flex;
            align-items: center;
            width: 100%;
            height: 52px;
            border: none;
            border-radius: 14px;
            background: var(--white);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0, 0, 0, 0.04);
            cursor: pointer;
            padding: 0 16px;
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        .google-button:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.06);
            transform: translateY(-1px);
        }

        .google-button:active {
            transform: scale(0.99);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0, 0, 0, 0.04);
        }

        .google-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .social-button-text {
            flex: 1;
            text-align: center;
            font-family: var(--font-text);
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            margin-right: 20px;
        }

        /* ── Apple Sign In ── */
        .apple-button {
            display: flex;
            align-items: center;
            width: 100%;
            height: 52px;
            border: none;
            border-radius: 14px;
            background: #000000;
            cursor: pointer;
            padding: 0 16px;
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .apple-button:hover {
            background: #1a1a1a;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .apple-button:active {
            transform: scale(0.99);
        }

        .apple-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .apple-button .social-button-text {
            color: #FFFFFF;
        }

        /* ═══════════════════════════════════════════════════
       DIVIDER
       ═══════════════════════════════════════════════════ */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            opacity: 0;
            animation: fadeIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) 0.25s forwards;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border-light);
        }

        .divider-text {
            font-family: var(--font-text);
            font-size: 13px;
            font-weight: 400;
            color: var(--text-placeholder);
            text-transform: lowercase;
        }

        /* ═══════════════════════════════════════════════════
       FORM
       ═══════════════════════════════════════════════════ */
        .form-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeSlideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) 0.3s forwards;
        }

        .input-field {
            width: 100%;
            height: 52px;
            border: none;
            border-radius: 14px;
            background: var(--bg-input);
            padding: 0 18px;
            font-family: var(--font-text);
            font-size: 16px;
            font-weight: 400;
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s ease;
            -webkit-appearance: none;
            appearance: none;
        }

        .input-field::placeholder {
            color: var(--text-placeholder);
            font-weight: 400;
        }

        .input-field:focus {
            background: #EBE9E6;
            box-shadow: 0 0 0 2px rgba(244, 167, 108, 0.25);
        }

        /* ── Password wrapper ── */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper .input-field {
            padding-right: 52px;
        }

        .password-toggle {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            border-radius: 10px;
            transition: background 0.15s ease;
        }

        .password-toggle:hover {
            background: rgba(0, 0, 0, 0.04);
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-placeholder);
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .helper-text {
            font-family: var(--font-text);
            font-size: 12px;
            font-weight: 400;
            color: var(--text-placeholder);
            padding-left: 4px;
            margin-top: -4px;
            transition: color 0.2s ease;
        }

        /* ── Validation states ── */
        .input-field.error {
            box-shadow: 0 0 0 2px rgba(255, 59, 48, 0.30);
        }

        .input-field.valid {
            box-shadow: 0 0 0 2px rgba(52, 199, 89, 0.25);
        }

        .helper-text.error {
            color: #FF3B30;
        }

        .helper-text.valid {
            color: #34C759;
        }

        .field-error {
            font-family: var(--font-text);
            font-size: 12px;
            font-weight: 400;
            color: #FF3B30;
            padding-left: 4px;
            margin-top: -4px;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.25s ease, opacity 0.2s ease, margin 0.25s ease;
        }

        .field-error.show {
            max-height: 24px;
            opacity: 1;
        }

        /* ═══════════════════════════════════════════════════
       BOTTOM AREA (CTA + Footer pinned to bottom)
       ═══════════════════════════════════════════════════ */
        .bottom-spacer {
            flex: 1;
        }

        .bottom-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeSlideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) 0.4s forwards;
        }

        .bottom-area .cta-button {
            width: 100%;
        }

        .cta-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 54px;
            border: none;
            border-radius: 14px;
            background: var(--accent);
            color: var(--white);
            font-family: var(--font-text);
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.01em;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(244, 167, 108, 0.20);
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 14px;
            background: linear-gradient(180deg,
                    rgba(255, 255, 255, 0.12) 0%,
                    transparent 50%);
            pointer-events: none;
        }

        .cta-button:hover {
            background: var(--accent-hover);
            box-shadow: 0 12px 32px rgba(244, 167, 108, 0.35);
            transform: translateY(-2px);
        }

        .cta-button:active {
            transform: scale(0.98) translateY(0px);
            box-shadow: 0 4px 16px rgba(244, 167, 108, 0.15);
        }

        /* ═══════════════════════════════════════════════════
       FOOTER LINK
       ═══════════════════════════════════════════════════ */
        .footer-link {
            font-family: var(--font-text);
            font-size: 14px;
            font-weight: 400;
            color: #AEAEB2;
            text-decoration: none;
            padding: 8px 12px;
            transition: color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .footer-link:hover {
            color: var(--text-secondary);
        }

        .footer-link span {
            font-weight: 500;
            color: #8A8A8E;
        }

        .footer-link:hover span {
            color: var(--text-primary);
        }

        /* ═══════════════════════════════════════════════════
       ANIMATIONS
       ═══════════════════════════════════════════════════ */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* ═══════════════════════════════════════════════════
       RESPONSIVE
       ═══════════════════════════════════════════════════ */
        @media (min-width: 600px) {
            .signup-screen {
                max-width: 420px;
                margin: 0 auto;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }
    </style>
</head>

<body>

    <main class="signup-screen">

        <!-- ── Header ── -->
        <header class="header">
            <button class="back-button" type="button" aria-label="Voltar" onclick="window.location.href='/'">
                <svg class="back-arrow" viewBox="0 0 24 24">
                    <polyline points="15 18 9 12 15 6" />
                </svg>
            </button>
            <h1 class="header-title">Comece a sincronizar<br>sua rotina</h1>
            <p class="header-subtitle">Crie sua conta para treinarmos o seu assistente.</p>
        </header>

        <!-- ── Social Login ── -->
        <section class="social-section">
            <button class="google-button" type="button">
                <!-- Google "G" logo (official colors) -->
                <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                <span class="social-button-text">Continuar com o Google</span>
            </button>
            <button class="apple-button" type="button">
                <svg class="apple-icon" viewBox="0 0 18 18" fill="white" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M14.94 13.05c-.33.76-.49 1.1-.91 1.78-.59.94-1.43 2.12-2.46 2.13-1.03.01-1.3-.67-2.7-.66-1.4.01-1.69.67-2.72.66-1.04-.01-1.83-1.07-2.42-2.02-1.65-2.65-1.83-5.76-.81-7.41.73-1.18 1.87-1.87 2.94-1.87 1.1 0 1.78.67 2.69.67.88 0 1.42-.68 2.69-.67.91.01 1.92.49 2.62 1.35-2.3 1.27-1.93 4.56.28 5.44zM11.38 4.22c.46-.59.81-1.42.68-2.27-.75.05-1.63.53-2.14 1.15-.46.56-.85 1.4-.7 2.22.82.03 1.67-.46 2.16-1.1z" />
                </svg>
                <span class="social-button-text">Continuar com a Apple</span>
            </button>
        </section>

        <!-- ── Divider ── -->
        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">ou</span>
            <div class="divider-line"></div>
        </div>

        <!-- ── Form ── -->
        <form class="form-section" onsubmit="return false;">
            <input class="input-field" type="text" id="name" placeholder="Nome" autocomplete="name"
                autocapitalize="words" required>
            <input class="input-field" type="email" id="email" placeholder="E-mail" autocomplete="email"
                inputmode="email" required>
            <p class="field-error" id="emailError">Insira um e-mail válido.</p>
            <div class="password-wrapper">
                <input class="input-field" type="password" id="password" placeholder="Senha" autocomplete="new-password"
                    required>
                <button class="password-toggle" type="button" aria-label="Mostrar senha" id="togglePassword">
                    <!-- Eye-off icon (password hidden) -->
                    <svg viewBox="0 0 24 24" id="eyeIcon">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                        <line x1="1" y1="1" x2="23" y2="23" id="eyeSlash" />
                    </svg>
                </button>
            </div>
            <p class="helper-text" id="passwordHelper">Use 8+ caracteres com letras e números.</p>
        </form>

        <!-- ── Spacer (keyboard-ready gap) ── -->
        <div class="bottom-spacer"></div>

        <!-- ── Bottom Area (CTA + Footer) ── -->
        <div class="bottom-area">
            <button id="cta-signup" class="cta-button" type="button">
                Criar conta
            </button>
            <a href="#" class="footer-link">Já tem uma conta? <span>Entrar</span></a>
        </div>

    </main>

    <script>
        document.addEventListener('touchmove', e => { if (e.target.tagName !== 'INPUT') e.preventDefault(); }, { passive: false });
        document.addEventListener('gesturestart', e => e.preventDefault());

        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const ctaButton = document.getElementById('cta-signup');
        const toggle = document.getElementById('togglePassword');
        const eyeSlash = document.getElementById('eyeSlash');
        const passwordHelper = document.getElementById('passwordHelper');
        const emailError = document.getElementById('emailError');

        // Password toggle
        toggle.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeSlash.style.display = isPassword ? 'none' : '';
            toggle.setAttribute('aria-label', isPassword ? 'Ocultar senha' : 'Mostrar senha');
        });

        // Email validation
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // Password validation (8+ chars, at least 1 letter and 1 number)
        function isValidPassword(pw) {
            return pw.length >= 8 && /[a-zA-Z]/.test(pw) && /[0-9]/.test(pw);
        }

        // Real-time email validation
        emailInput.addEventListener('blur', () => {
            const val = emailInput.value.trim();
            if (val === '') {
                emailInput.classList.remove('error', 'valid');
                emailError.classList.remove('show');
            } else if (!isValidEmail(val)) {
                emailInput.classList.add('error');
                emailInput.classList.remove('valid');
                emailError.classList.add('show');
            } else {
                emailInput.classList.remove('error');
                emailInput.classList.add('valid');
                emailError.classList.remove('show');
            }
        });

        emailInput.addEventListener('input', () => {
            if (emailInput.classList.contains('error') && isValidEmail(emailInput.value.trim())) {
                emailInput.classList.remove('error');
                emailInput.classList.add('valid');
                emailError.classList.remove('show');
            }
        });

        // Real-time password validation
        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            if (val === '') {
                passwordInput.classList.remove('error', 'valid');
                passwordHelper.classList.remove('error', 'valid');
            } else if (isValidPassword(val)) {
                passwordInput.classList.remove('error');
                passwordInput.classList.add('valid');
                passwordHelper.classList.remove('error');
                passwordHelper.classList.add('valid');
                passwordHelper.textContent = '✓ Senha segura';
            } else {
                passwordInput.classList.remove('valid');
                passwordInput.classList.add('error');
                passwordHelper.classList.remove('valid');
                passwordHelper.classList.add('error');
                passwordHelper.textContent = 'Use 8+ caracteres com letras e números.';
            }
        });

        passwordInput.addEventListener('blur', () => {
            if (passwordInput.value === '') {
                passwordHelper.classList.remove('error', 'valid');
                passwordHelper.textContent = 'Use 8+ caracteres com letras e números.';
            }
        });

        // CTA — validate and navigate
        ctaButton.addEventListener('click', () => {
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const pw = passwordInput.value;
            let hasError = false;

            // Name
            if (name === '') {
                nameInput.classList.add('error');
                hasError = true;
            } else {
                nameInput.classList.remove('error');
            }

            // Email
            if (!isValidEmail(email)) {
                emailInput.classList.add('error');
                emailInput.classList.remove('valid');
                emailError.classList.add('show');
                hasError = true;
            }

            // Password
            if (!isValidPassword(pw)) {
                passwordInput.classList.add('error');
                passwordInput.classList.remove('valid');
                passwordHelper.classList.add('error');
                passwordHelper.classList.remove('valid');
                passwordHelper.textContent = 'Use 8+ caracteres com letras e números.';
                hasError = true;
            }

            if (hasError) {
                // Shake the first error field
                const first = document.querySelector('.input-field.error');
                if (first) {
                    first.style.animation = 'none';
                    first.offsetHeight; // trigger reflow
                    first.style.animation = 'shake 0.4s ease';
                    first.focus();
                }
                return;
            }

            // Success — navigate to onboarding
            window.location.href = '/onboarding.html';
        });

        // Clear error on focus
        nameInput.addEventListener('input', () => {
            if (nameInput.value.trim() !== '') nameInput.classList.remove('error');
        });
    </script>

    <style>
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-6px);
            }

            40% {
                transform: translateX(6px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
